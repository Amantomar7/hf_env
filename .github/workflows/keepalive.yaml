name: Keep HF Space Alive

on:
  schedule:
    - cron: "*/20 * * * *"  # every 20 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Space
        run: |
          curl -X POST https://bfs-search-mail-checker.hf.space/reset \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10 \
            -w "\nStatus: %{http_code}\n"